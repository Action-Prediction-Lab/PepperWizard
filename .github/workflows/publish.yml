name: Publish images

on:
  push:
    tags: ['v*']
  public:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  WIZARD_IMAGE: ghcr.io/action-prediction-lab/pepper-wizard
  STT_IMAGE: ghcr.io/action-prediction-lab/pepper-stt

jobs:
  publish-tag:
    # On a tag push to a public repo: build and push both images.
    if: |
      github.event_name == 'push' &&
      github.event.repository.private == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push pepper-wizard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.WIZARD_IMAGE }}:${{ github.ref_name }}
            ${{ env.WIZARD_IMAGE }}:latest
          cache-from: type=gha,scope=wizard
          cache-to: type=gha,mode=max,scope=wizard

      - name: Build and push pepper-stt
        uses: docker/build-push-action@v5
        with:
          context: .
          file: stt-service/Dockerfile
          push: true
          tags: |
            ${{ env.STT_IMAGE }}:${{ github.ref_name }}
            ${{ env.STT_IMAGE }}:latest
          cache-from: type=gha,scope=stt
          cache-to: type=gha,mode=max,scope=stt

  backfill:
    # On private->public flip or manual re-run: build every existing v* tag,
    # both images per tag.
    if: github.event_name == 'public' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push each existing v* tag (both images)
        run: |
          set -euo pipefail
          tags=$(git tag --list 'v*' --sort=creatordate)
          if [[ -z "$tags" ]]; then
            echo "No v* tags found, nothing to backfill."
            exit 0
          fi
          for tag in $tags; do
            echo "::group::$tag"
            git checkout "$tag"
            docker build -t "$WIZARD_IMAGE:$tag" -f Dockerfile .
            docker push "$WIZARD_IMAGE:$tag"
            docker build -t "$STT_IMAGE:$tag" -f stt-service/Dockerfile .
            docker push "$STT_IMAGE:$tag"
            echo "::endgroup::"
          done
          latest=$(echo "$tags" | tail -1)
          docker tag "$WIZARD_IMAGE:$latest" "$WIZARD_IMAGE:latest"
          docker push "$WIZARD_IMAGE:latest"
          docker tag "$STT_IMAGE:$latest" "$STT_IMAGE:latest"
          docker push "$STT_IMAGE:latest"
