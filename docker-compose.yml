# MVP stack for PepperWizard → physical Pepper robot.
#
# This compose is self-contained: it does NOT require sibling checkouts of
# PepperBox or PepperPerception. `pepper-robot-env` uses the baked-in NAOqi
# shim from the published image; `pepper-wizard` pip-installs the bridge at
# build time (see Dockerfile). Tracking and proprioception services are
# optional and live in `docker-compose.dev.yml` — enable them with:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Robot connection: copy `robot.env.example` to `robot.env` and set NAOQI_IP.

services:
  pepper-robot-env:
    image: jwgcurrie/pepper-box:01-26-latest
    network_mode: host
    volumes:
      - ./robot.env:/home/pepperdev/py3-naoqi-bridge/robot.env
    env_file:
      - robot.env
    environment:
      - PYTHONUNBUFFERED=1
    command: [ "/home/pepperdev/.pyenv/versions/2.7.18/bin/python", "/home/pepperdev/py3-naoqi-bridge/shim_server.py" ]
    restart: on-failure

  pepper-wizard:
    build: .
    image: pepper-wizard:latest
    env_file:
      - robot.env
    environment:
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - PYTHONPATH=/usr/src/app
    command: [ "python", "-m", "pepper_wizard.main", "--proxy-ip", "localhost", "--proxy-port", "5000" ]
    depends_on:
      pepper-robot-env:
        condition: service_started
      stt-service:
        condition: service_healthy
    stdin_open: true
    tty: true
    network_mode: host
    volumes:
      - .:/usr/src/app
    restart: on-failure

  stt-service:
    build:
      context: .
      dockerfile: stt-service/Dockerfile
    image: pepper-stt:latest
    network_mode: host
    volumes:
      - ./stt-service:/app
      - ./pepper_wizard/config:/app/pepper_config:ro
      - /run/user/${UID:-1000}/pulse:/run/user/1000/pulse
      - ${HOME}/.config/pulse/cookie:/root/.config/pulse/cookie:ro
    environment:
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      - PYTHONUNBUFFERED=1
      - HF_HOME=/opt/whisper-cache
    healthcheck:
      # Round-trips a real ZMQ ping so pepper-wizard only starts after STT
      # is answering on :5562 (and the Whisper model is loaded).
      test: ["CMD", "python", "-c", "import sys, zmq; ctx=zmq.Context.instance(); s=ctx.socket(zmq.REQ); s.setsockopt(zmq.RCVTIMEO,2000); s.setsockopt(zmq.SNDTIMEO,2000); s.setsockopt(zmq.LINGER,0); s.connect('tcp://localhost:5562'); s.send_json({'action':'ping'}); sys.exit(0 if s.recv_json().get('status')=='ok' else 1)"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 30s
    restart: on-failure
