# MVP stack for PepperWizard → physical Pepper robot.
#
# This compose is self-contained: it does NOT require sibling checkouts of
# PepperBox or PepperPerception. `pepper-robot-env` uses the baked-in NAOqi
# shim from the published image; `pepper-wizard` pip-installs the bridge at
# build time (see Dockerfile). Tracking and proprioception services are
# optional and live in `docker-compose.dev.yml` — enable them with:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Robot connection: copy `robot.env.example` to `robot.env` and set NAOQI_IP.

services:
  pepper-robot-env:
    image: jwgcurrie/pepper-box:01-26-latest
    network_mode: host
    volumes:
      - ./robot.env:/home/pepperdev/py3-naoqi-bridge/robot.env
    env_file:
      - robot.env
    environment:
      - PYTHONUNBUFFERED=1
    command: [ "/home/pepperdev/.pyenv/versions/2.7.18/bin/python", "/home/pepperdev/py3-naoqi-bridge/shim_server.py" ]
    restart: on-failure

  pepper-wizard:
    build: .
    image: pepper-wizard:latest
    env_file:
      - robot.env
    environment:
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - PYTHONPATH=/usr/src/app
    command: [ "python", "-m", "pepper_wizard.main", "--proxy-ip", "localhost", "--proxy-port", "5000" ]
    depends_on:
      - pepper-robot-env
      - stt-service
    stdin_open: true
    tty: true
    network_mode: host
    volumes:
      - .:/usr/src/app
    restart: on-failure

  stt-service:
    build: ./stt-service
    image: pepper-stt:latest
    network_mode: host
    volumes:
      - ./stt-service:/app
      - /run/user/${UID:-1000}/pulse:/run/user/1000/pulse
      - ${HOME}/.config/pulse/cookie:/root/.config/pulse/cookie:ro
    environment:
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      - PYTHONUNBUFFERED=1
    restart: on-failure
