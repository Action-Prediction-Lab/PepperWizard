# Developer overlay: runs the qiBullet sim image and adds the optional services
# (proprioception, perception, dualshock) plus sibling-repo live mounts.
# Requires sibling checkouts of `../PepperBox` and `../PepperPerception`.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# GPU-heavy services (perception) are gated behind the `gpu` profile so the
# rest of the stack runs on hosts without an NVIDIA runtime. Enable with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile gpu up
#
# The overlay swaps `pepper-robot-env` from the published NAOqi bridge image to
# the sim-capable `pepper-box:latest` (headless qiBullet) and mounts /dev/dri so
# pybullet's GL renderer works on any open-source driver (AMD, Intel, NVIDIA).

services:
  pepper-robot-env:
    image: pepper-box:latest
    devices:
      - /dev/dri:/dev/dri                                    # GPU render nodes (AMD/Intel/NVIDIA via mesa)
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix                        # pybullet GUI (sim mode)
      - ../PepperBox/py3-naoqi-bridge:/home/pepperdev/py3-naoqi-bridge
      - ../PepperBox/src:/home/pepperdev/src                 # sim shim + setup_wizard (live editing)
      - ../PepperBox/.qibullet:/home/pepperdev/.qibullet     # persist qibullet asset cache across `compose down`
      - ../PepperBox/entrypoint.sh:/home/pepperdev/entrypoint.sh:ro  # sibling's sim/physical-switching entrypoint
      - ${HOME}/.pepperbox/pynaoqi-python2.7-2.5.7.1-linux64:/opt/pynaoqi-python2.7-2.5.7.1-linux64:ro  # proprietary SDK lives on host, never in image; populated by PepperBox/setup.sh
    environment:
      - DISPLAY=${DISPLAY}
      - QIBULLET_GUI=${QIBULLET_GUI:-false}                  # headless by default; set QIBULLET_GUI=true for the pybullet window
      - NVIDIA_DRIVER_CAPABILITIES=all                       # honoured only when nvidia-container-runtime is present
      - NVIDIA_VISIBLE_DEVICES=all
    command: [ "/home/pepperdev/entrypoint.sh" ]

  proprioception-service:
    image: pepper-box:latest
    network_mode: host
    volumes:
      - ./robot.env:/home/pepperdev/py3-naoqi-bridge/robot.env
      - ../PepperBox/py3-naoqi-bridge:/home/pepperdev/py3-naoqi-bridge
      - ${HOME}/.pepperbox/pynaoqi-python2.7-2.5.7.1-linux64:/opt/pynaoqi-python2.7-2.5.7.1-linux64:ro
    env_file:
      - robot.env
    environment:
      - PYTHONUNBUFFERED=1
    command: [ "python2", "/home/pepperdev/py3-naoqi-bridge/state_service.py" ]
    restart: on-failure

  audio-publisher-service:
    image: pepper-box:latest
    network_mode: host
    volumes:
      - ./robot.env:/home/pepperdev/py3-naoqi-bridge/robot.env
      - ../PepperBox/py3-naoqi-bridge:/home/pepperdev/py3-naoqi-bridge
      - ${HOME}/.pepperbox/pynaoqi-python2.7-2.5.7.1-linux64:/opt/pynaoqi-python2.7-2.5.7.1-linux64:ro
    env_file:
      - robot.env
    environment:
      - PYTHONUNBUFFERED=1
    command: [ "python2", "/home/pepperdev/py3-naoqi-bridge/audio_publisher.py" ]
    depends_on:
      - pepper-robot-env

  dualshock-publisher:
    image: jwgcurrie/dualshock_publisher:latest
    privileged: true
    volumes:
      - /dev/input:/dev/input
    network_mode: host
    restart: unless-stopped

  perception-service:
    profiles: [ gpu ]                                        # opt-in via `--profile gpu` (requires NVIDIA runtime)
    build: ../PepperPerception
    image: pepper-perception:latest
    shm_size: '2gb'
    command: [ "python", "-m", "perception_service.main", "--backend", "combined" ]
    ports:
      - "5557:5557"
    volumes:
      - ../PepperPerception:/app
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    restart: unless-stopped

  pepper-wizard:
    environment:
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - PYTHONPATH=/usr/src/app:/usr/src/PepperBox/py3-naoqi-bridge:/usr/src/PepperPerception
    depends_on:
      pepper-robot-env:
        condition: service_started
      proprioception-service:
        condition: service_started
      dualshock-publisher:
        condition: service_started
      stt-service:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
      - ../PepperBox/py3-naoqi-bridge:/usr/src/PepperBox/py3-naoqi-bridge
      - ../PepperPerception:/usr/src/PepperPerception
    extra_hosts:
      - "host.docker.internal:host-gateway"
